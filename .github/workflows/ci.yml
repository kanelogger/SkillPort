name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["22.16.0", "24.15.0"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:platform
      - run: npm run test:discovery
      - run: npm run test:package
      - run: npm run desktop:typecheck
        if: matrix.node == '24.15.0'
      - run: npm run desktop:test
        if: matrix.node == '24.15.0'
      - run: npm run desktop:build
        if: matrix.node == '24.15.0'

  desktop-macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - run: npm run desktop:e2e
      - run: npm run desktop:make
      - name: Verify macOS app package
        shell: bash
        run: |
          app="$(find apps/desktop/out -type d -name 'Skill Port.app' -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          smoke_log="$RUNNER_TEMP/skill-port-smoke.log"
          open -W -n "$app" -o "$smoke_log" --stderr "$smoke_log" --args --skill-port-smoke-test &
          launcher_pid=$!
          completed=false
          for _ in {1..20}; do
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              wait "$launcher_pid" || { cat "$smoke_log"; exit 1; }
              completed=true
              break
            fi
            sleep 1
          done
          if [[ "$completed" != true ]]; then
            cat "$smoke_log"
            kill "$launcher_pid" 2>/dev/null || true
            pkill -f "$app/Contents/MacOS/skill-port" || true
            exit 1
          fi
          cat "$smoke_log"
          grep -q 'SKILL_PORT_SMOKE_READY' "$smoke_log"

  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - run: npm pack --dry-run
