name: CI

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:platform
      - run: npm run test:discovery
      - run: npm run test:package
      - run: npm run desktop:typecheck
      - run: npm run desktop:test
      - run: npm run desktop:build

  desktop-macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - run: npm run desktop:e2e
      - run: npm run desktop:make
      - name: Verify macOS app signature
        shell: bash
        run: |
          app="$(find apps/desktop/out -type d -name 'Skill Port.app' -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"

  package:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - run: npm pack --dry-run
