name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  make:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: desktop-macos-arm64
          - os: macos-15-intel
            artifact: desktop-macos-x64
          - os: windows-latest
            artifact: desktop-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - name: Verify Desktop version tag
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const p=require('./apps/desktop/package.json'); if (process.env.RELEASE_TAG !== 'desktop-v' + p.version) process.exit(1)"
      - run: npm ci
      - run: npm run desktop:typecheck
      - run: npm run desktop:test
      - run: npm run desktop:make
      - name: Verify macOS app package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app="$(find apps/desktop/out -type d -name 'Skill Port.app' -print -quit)"
          test -n "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          smoke_log="$RUNNER_TEMP/skill-port-smoke.log"
          open -W -n "$app" -o "$smoke_log" --stderr "$smoke_log" --args --skill-port-smoke-test &
          launcher_pid=$!
          completed=false
          for _ in {1..20}; do
            if ! kill -0 "$launcher_pid" 2>/dev/null; then
              wait "$launcher_pid" || { cat "$smoke_log"; exit 1; }
              completed=true
              break
            fi
            sleep 1
          done
          if [[ "$completed" != true ]]; then
            cat "$smoke_log"
            kill "$launcher_pid" 2>/dev/null || true
            pkill -f "$app/Contents/MacOS/skill-port" || true
            exit 1
          fi
          cat "$smoke_log"
          grep -q 'SKILL_PORT_SMOKE_READY' "$smoke_log"
      - name: Verify Windows packaged app launches
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path apps/desktop/out -Recurse -Filter 'skill-port.exe' |
            Where-Object { $_.FullName -like '*win32-x64*' -and $_.FullName -notlike '*\make\*' } |
            Select-Object -First 1
          if (-not $exe) { throw 'Packaged skill-port.exe not found under apps/desktop/out/*win32-x64' }
          $env:SKILL_PORT_SMOKE_LOG = "$env:RUNNER_TEMP/skill-port-smoke.log"
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList '--skill-port-smoke-test' -PassThru -NoNewWindow
          $exited = $proc.WaitForExit(20000)
          if (-not $exited) {
            $proc.Kill()
            throw 'Windows smoke test timed out waiting for skill-port.exe to exit'
          }
          if (-not (Test-Path $env:SKILL_PORT_SMOKE_LOG)) {
            throw 'Smoke log file was not created'
          }
          Get-Content $env:SKILL_PORT_SMOKE_LOG
          if (-not (Select-String -Path $env:SKILL_PORT_SMOKE_LOG -Pattern 'SKILL_PORT_SMOKE_READY' -Quiet)) {
            throw 'Smoke test did not report SKILL_PORT_SMOKE_READY'
          }
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p release-assets
          find apps/desktop/out/make -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*Setup.exe' \
          \) -print0 | while IFS= read -r -d '' file; do
            filename="$(basename "$file" | tr ' ' '.')"
            cp "$file" "release-assets/$filename"
          done
          test -n "$(find release-assets -type f -print -quit)"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: make
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "Skill Port Desktop ${RELEASE_TAG#desktop-v}" \
              --notes-file .github/desktop-release-notes.md
          fi
