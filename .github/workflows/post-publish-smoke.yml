name: Post-publish smoke

on:
  workflow_call:
    inputs:
      version:
        description: Published Skill Port CLI version or tag
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Published Skill Port CLI version or tag
        required: true
        type: string

permissions:
  contents: read

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm run smoke:published -- ${{ inputs.version }}
